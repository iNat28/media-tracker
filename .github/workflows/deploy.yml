name: Deploy to Cloudflare

on:
  push:
    branches: ["main", "cloudflare-migration"]
  workflow_dispatch: # This adds a "Run workflow" button in the GitHub UI!

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # This caches your node_modules so future deploys are 2x faster

      - name: Install dependencies
        run: npm install

      - name: Build Next.js for Cloudflare
        run: npx @opennextjs/cloudflare build
        
      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx @opennextjs/cloudflare deploy