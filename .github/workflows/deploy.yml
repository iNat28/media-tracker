name: Deploy to Cloudflare

on:
  push:
    branches: ["main", "preview", "dev"] # Listens to all 3 branches!
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # 1. Dynamically name the project based on the GitHub branch
      - name: Set Project Name
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "PROJECT_NAME=media-tracker" >> $GITHUB_ENV
          else
            echo "PROJECT_NAME=media-tracker-${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      # 2. Generate the Cloudflare config file on the fly
      - name: Create Cloudflare Config
        run: |
          echo '{
            "name": "${{ env.PROJECT_NAME }}",
            "main": ".open-next/worker.js",
            "compatibility_date": "2024-12-30",
            "compatibility_flags": ["nodejs_compat"],
            "assets": {
              "directory": ".open-next/assets",
              "binding": "ASSETS"
            }
          }' > wrangler.jsonc

      - name: Build Next.js for Cloudflare
        run: npx @opennextjs/cloudflare build
        
      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx @opennextjs/cloudflare deploy