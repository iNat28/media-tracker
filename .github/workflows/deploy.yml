name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main", "cloudflare-migration"] # This triggers the deploy when you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest # This is Linux! It bypasses your Windows bug.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build and Deploy via OpenNext
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx @opennextjs/cloudflare deploy